<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GalpiDock Drive Picker</title>
  <style>
    body { margin: 0; background: #1a1a2e; font-family: -apple-system, sans-serif; color: #ccc; overflow: hidden; }
    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; opacity: 0.6; }
    .toolbar { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 9999; background: #fff; padding: 8px 16px; border-bottom: 1px solid #ddd; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .toolbar label { font-size: 13px; color: #333; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; user-select: none; font-weight: 500; }
    .toolbar input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: #4285f4; }
  </style>
</head>
<body>
  <div class="loading" id="status">Loading Google Drive Picker...</div>
  <div class="toolbar" id="toolbar">
    <label><input type="checkbox" id="ownedByMe"> Show only my files</label>
  </div>
  <script>
    var pickerReady = false;
    var pickerConfig = null;
    var currentPicker = null;

    function onGapiLoad() {
      gapi.load("picker", function() {
        pickerReady = true;
        document.getElementById("status").textContent = "Waiting for configuration...";
        if (window.opener) {
          window.opener.postMessage({ type: "picker-ready" }, "*");
        }
      });
    }

    function buildPicker(config, ownedOnly) {
      if (currentPicker) {
        currentPicker.setVisible(false);
        currentPicker.dispose();
      }

      var myDriveView = new google.picker.DocsView()
        .setIncludeFolders(true)
        .setSelectFolderEnabled(false)
        .setOwnedByMe(ownedOnly)
        .setLabel("My Drive");

      var sharedDriveView = new google.picker.DocsView()
        .setIncludeFolders(true)
        .setSelectFolderEnabled(false)
        .setEnableDrives(true)
        .setLabel("Shared Drives");

      var builder = new google.picker.PickerBuilder()
        .setAppId(config.appId)
        .setOAuthToken(config.token)
        .setDeveloperKey(config.apiKey)
        .setSize(window.innerWidth, window.innerHeight)
        .addView(myDriveView)
        .addView(sharedDriveView)
        .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
        .enableFeature(google.picker.Feature.SUPPORT_DRIVES)
        .setCallback(function(data) {
          if (data.action === google.picker.Action.PICKED) {
            var files = data.docs.map(function(doc) {
              return {
                id: doc.id,
                name: doc.name,
                mimeType: doc.mimeType,
                iconUrl: doc.iconUrl,
                url: doc.url
              };
            });
            if (window.opener) {
              window.opener.postMessage({ type: "picker-result", files: files }, "*");
            }
            window.close();
          } else if (data.action === google.picker.Action.CANCEL) {
            if (window.opener) {
              window.opener.postMessage({ type: "picker-cancel" }, "*");
            }
            window.close();
          }
        });

      currentPicker = builder.build();
      currentPicker.setVisible(true);
    }

    document.getElementById("ownedByMe").addEventListener("change", function() {
      if (pickerConfig) {
        buildPicker(pickerConfig, this.checked);
      }
    });

    window.addEventListener("message", function(e) {
      if (!e.data || e.data.type !== "open-picker") return;
      if (!pickerReady) return;

      pickerConfig = { token: e.data.token, apiKey: e.data.apiKey, appId: e.data.appId };
      document.getElementById("status").style.display = "none";
      document.getElementById("toolbar").style.display = "block";

      var ownedOnly = document.getElementById("ownedByMe").checked;
      buildPicker(pickerConfig, ownedOnly);
    });
  </script>
  <script src="https://apis.google.com/js/api.js" onload="onGapiLoad()"></script>
</body>
</html>
